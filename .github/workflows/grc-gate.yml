name: GRC Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  grc-gate:
    name: Governance, Risk & Compliance Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: terraform/environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/environments/dev
        run: terraform plan -out=tfplan.binary

      - name: Convert Plan to JSON
        working-directory: terraform/environments/dev
        run: terraform show -json tfplan.binary > plan.json

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.45.0/conftest_0.45.0_Linux_x86_64.tar.gz
          tar -xzf conftest_0.45.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run Policy Checks (OPA/Rego)
        run: conftest test terraform/environments/dev/plan.json --policy policy/terraform

      - name: Run Rego Unit Tests
        run: conftest test policy/tests

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-json
          path: terraform/environments/dev/plan.json
