name: GRC Gate v2

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  ENVIRONMENT: dev

jobs:
  grc-gate:
    name: Governance, Risk & Compliance Gate
    runs-on: ubuntu-latest

    env:
      KMS_KEY_ID: ${{ secrets.KMS_KEY_ID }}
      EVIDENCE_BUCKET: ${{ secrets.EVIDENCE_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # AWS CREDENTIALS VIA OIDC
      # -----------------------------
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::846470648858:role/GitHubGrcGateRole
          aws-region: us-east-1

      - name: Export AWS Region for Terraform
        run: echo "AWS_REGION=us-east-1" >> $GITHUB_ENV
      
      # -----------------------------
      # INSTALL TERRAFORM
      # -----------------------------
      - name: Install Terraform
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gnupg software-properties-common
          wget -O- https://apt.releases.hashicorp.com/gpg | \
            gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" | \
            sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -y
          sudo apt-get install -y terraform
          terraform -version

      # -----------------------------
      # TERRAFORM INIT
      # -----------------------------
      - name: Terraform Init
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform init -input=false

      # -----------------------------
      # TERRAFORM STATIC CHECKS
      # -----------------------------
      - name: Static Checks
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          terraform fmt -check -recursive
          terraform validate

      # -----------------------------
      # TERRAFORM PLAN
      # -----------------------------
      - name: Terraform Plan
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform plan -out=tfplan.binary

      - name: Convert Plan to JSON
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform show -json tfplan.binary > plan.json

      # -----------------------------
      # POLICY CHECKS
      # -----------------------------
      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.45.0/conftest_0.45.0_Linux_x86_64.tar.gz
          tar -xzf conftest_0.45.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Policy Checks
        run: |
          conftest test terraform/environments/${{ env.ENVIRONMENT }}/plan.json \
            -p policy/terraform \
            -p policy/tests

      # -----------------------------
      # EVIDENCE SIGNING (KMS + COSIGN)
      # -----------------------------
      - name: Hash Terraform plan
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          openssl dgst -sha256 -binary plan.json > plan.sha256

      - name: Sign hash with KMS
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          aws kms sign \
            --key-id "$KMS_KEY_ID" \
            --message fileb://plan.sha256 \
            --message-type DIGEST \
            --signing-algorithm RSASSA_PSS_SHA_256 \
            --output text \
            --query Signature > plan.sig.kms

      - name: Install Cosign
        run: |
          COSIGN_VERSION=v2.4.0
          curl -sSL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" -o cosign
          chmod +x cosign
          sudo mv cosign /usr/local/bin/cosign

      - name: Cosign keyless sign plan hash
        env:
          COSIGN_EXPERIMENTAL: "true"
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          base64 plan.sha256 > plan.sha256.b64
          cosign sign-blob \
            --yes \
            --output-signature plan.sig.cosign \
            plan.sha256.b64

      # -----------------------------
      # EVIDENCE BUNDLE + UPLOAD
      # -----------------------------
      - name: Build evidence bundle
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          mkdir -p evidence
          cp plan.json plan.sha256 plan.sig.kms plan.sig.cosign evidence/
          cat > evidence/metadata.json <<EOF
          {
            "commit": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": "${GITHUB_RUN_ID}",
            "environment": "${{ env.ENVIRONMENT }}"
          }
          EOF

      - name: Upload evidence bundle to S3
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          aws s3 cp evidence "s3://${{ env.EVIDENCE_BUCKET }}/runs/${GITHUB_RUN_ID}/" --recursive

      # -----------------------------
      # OSCAL VALIDATION
      # -----------------------------
      - name: Install OSCAL tools
        run: pip install oscal

      - name: OSCAL Validation
        run: |
          oscal validate oscal/profile.yaml
          oscal validate oscal/component.yaml
          oscal validate oscal/assessment-plan.yaml
          oscal validate oscal/assessment-results.yaml
